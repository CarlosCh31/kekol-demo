<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="Decibel">
  <defs>
    <linearGradient id="l-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#1c3fb0"/>
    </linearGradient>
    <linearGradient id="l-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#22d3a5"/>
    </linearGradient>
    <linearGradient id="l-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e1530"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#l-bg)"/>
  <g stroke="url(#l-wave)" stroke-width="3.4" stroke-linecap="round" fill="none">
    <line x1="14" y1="32" x2="14" y2="32"/>
    <line x1="22" y1="24" x2="22" y2="40"/>
    <line x1="30" y1="18" x2="30" y2="46"/>
    <line x1="38" y1="14" x2="38" y2="50"/>
    <line x1="46" y1="22" x2="46" y2="42"/>
    <line x1="54" y1="28" x2="54" y2="36"/>
  </g>
  <text x="78" y="42"
        font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-weight="700" font-size="30" letter-spacing="-0.5"
        fill="url(#l-word)">Decibel</text>
</svg>
